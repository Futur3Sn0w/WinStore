<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --youtube-red: #cc0000;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
}

#youtube-app {
  position: relative;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}

#youtube-view {
  position: absolute;
  inset: 0;
  border: none;
  background: #000;
}

#youtube-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  background: radial-gradient(circle at top, rgba(204, 0, 0, 0.22), transparent 40%), linear-gradient(180deg, #101010 0%, #000 100%);
  z-index: 20;
  transition: opacity 0.2s ease;
}

#youtube-loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.youtube-spinner {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 4px solid rgba(255, 255, 255, 0.12);
  border-top-color: var(--youtube-red);
  animation: youtube-spin 1s linear infinite;
}

.youtube-loading-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.youtube-loading-status {
  font-size: 12px;
  opacity: 0.75;
}

@keyframes youtube-spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="youtube-app">
  <div id="youtube-loading">
    <div class="youtube-spinner"></div>
    <div class="youtube-loading-title">Loading YouTube...</div>
    <div id="youtube-loading-status" class="youtube-loading-status">Starting webview session</div>
  </div>
  <webview id="youtube-view" src="https://www.youtube.com/" partition="persist:youtube" allowpopups nodeintegration="false" disablewebsecurity></webview>
</div>
<script src="youtube.js"></script>
</body>
</html>
