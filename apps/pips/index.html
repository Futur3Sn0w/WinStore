<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pips</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        webview {
            flex: 1;
            width: 100%;
            border: none;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #cc2222;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading Pips...</div>
        </div>
        <webview id="game-view"
                 src="https://www.nytimes.com/games/pips"
                 partition="persist:nytgames"
                 allowpopups
                 nodeintegration="false"
                 disablewebsecurity
                 webpreferences="allowRunningInsecureContent">
        </webview>
    </div>

    <script>
        const webview = document.getElementById('game-view');
        const loading = document.getElementById('loading');
        const loadingText = loading.querySelector('.loading-text');

        webview.addEventListener('did-finish-load', () => {
            setTimeout(() => loading.classList.add('hidden'), 500);
        });

        webview.addEventListener('did-fail-load', (event) => {
            if (event.errorCode !== -3) {
                loadingText.textContent = `Error ${event.errorCode}: ${event.errorDescription}`;
                loadingText.style.color = '#ff4444';
            }
        });

        webview.addEventListener('dom-ready', () => {
            loading.classList.add('hidden');
        });

        setTimeout(() => {
            if (!loading.classList.contains('hidden')) {
                loadingText.textContent = 'Taking longer than expected...';
            }
        }, 10000);
    </script>
</body>
</html>
